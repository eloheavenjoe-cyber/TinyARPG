<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TinyARPG</title>
  <!-- Google Fonts for dark fantasy typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=MedievalSharp&family=Uncial+Antiqua&display=swap" rel="stylesheet">
  <!-- ═══ VISUAL OVERHAUL ═══ -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #000;
      display: flex; align-items: center; justify-content: center;
    }
    canvas {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      cursor: crosshair;
    }
    /* Thin scrollbar dark fantasy style */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0a0805; }
    ::-webkit-scrollbar-thumb {
      background: #6b4c1e;
      border-radius: 3px;
      border: 1px solid #c8963e;
    }
    ::-webkit-scrollbar-thumb:hover { background: #8a6a2a; }
    /* Low-health red vignette — VISUAL ONLY */
    #low-hp-vignette {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9998;
      opacity: 0;
      transition: opacity 0.3s ease;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(140,0,0,0.35) 100%);
    }
  </style>
</head>
<body>
  <div id="low-hp-vignette"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
